name: SonarQube Analysis

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  sonar:
    runs-on: self-hosted

    steps:
      - name: Checkout

        uses: actions/checkout@v4

      - name: Restore

        run: dotnet restore

      - name: Sonar Begin

        shell: pwsh

        run: |

          C:\Tools\SonarScanner\dotnet-sonarscanner begin `
          /k:"SonarCubewithDotNet" `
          /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" `
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Build

        run: dotnet build --no-restore

      - name: Sonar End

        shell: pwsh

        run: |

          C:\Tools\SonarScanner\dotnet-sonarscanner end `
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
